<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAME 30 | OBSTAWIANIE</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        .fame-font { font-family: 'Orbitron', sans-serif; }
        .gold-text { color: #d4af37; }
        .btn-gold { background: linear-gradient(45deg, #d4af37, #f4cf57); color: black; font-weight: 900; }
        .card-bg { background: #0f0f0f; border: 1px solid #1a1a1a; }
        .ticket-gradient { background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%); border: 2px solid #d4af37; }
        .toast-show { transform: translateX(0); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast-hide { transform: translateX(150%); transition: transform 0.5s ease-in; }
        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 5px rgba(212,175,55,0.2); } 50% { box-shadow: 0 0 20px rgba(212,175,55,0.4); } }
        .animate-gold { animation: pulse-gold 3s infinite; }
        .blur-bg { backdrop-filter: blur(20px); background: rgba(0,0,0,0.85); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // KONFIGURACJA
        const firebaseConfig = {
            apiKey: "AIzaSyDSW1Rbw-gDY_JQ9YTrdb3lrJCZf0aAWyw",
            authDomain: "fame-30.firebaseapp.com",
            databaseURL: "https://fame-30-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fame-30",
            storageBucket: "fame-30.firebasestorage.app",
            messagingSenderId: "447768289074",
            appId: "1:447768289074:web:49ce781e967ab86417812b"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const WEBHOOK_URL = "https://discord.com/api/webhooks/1482735762553176105/vCpLZNRhwP8bUYget_Aqf5e7ll6bBqvHTw3-HzvNeGyP";
        const DEADLINE = new Date('2026-03-21T19:30:00'); // Start pierwszej walki

        const FIGHTS = [
            { id: 1, p1: 'Monika Weitz', o1: '1.15', p2: 'Wiktoria Zagacka', o2: '4.70', cat: 'BOKS' },
            { id: 2, p1: 'Krystian Jakiel', o1: '3.20', p2: 'Piotr Szewc', o2: '1.30', cat: 'BOKS' },
            { id: 3, p1: 'Oskar Wierzejski', o1: '1.17', p2: 'Klaudiusz Mazanowski', o2: '4.40', cat: 'MMA' },
            { id: 4, p1: 'Michał Pasternak', o1: '1.10', p2: 'Michał Królik', o2: '5.85', cat: 'BOKS' },
            { id: 5, p1: 'Nikola Biela', o1: '1.75', p2: 'Żaneta Koloska', o2: '1.95', cat: 'K-1' },
            { id: 6, p1: 'Łukasz Pawłowski', o1: '1.17', p2: 'Nikodem Sławik', o2: '4.40', cat: 'K-1 / MMA' },
            { id: 7, p1: 'Robert Karaś', o1: '1.13', p2: 'Kasper Gutkowski', o2: '5.10', cat: 'BOKS / K-1' },
            { id: 8, p1: 'Krzyżanowski/Bazyluk', o1: '4.00', p2: 'Stępień/Fares', o2: '1.20', cat: '2vs2 MMA/BOKS' },
            { id: 9, p1: 'Marta Linkiewicz', o1: '1.25', p2: 'Izabela Badurek', o2: '3.50', cat: 'K-1' },
            { id: 10, p1: 'Alan Kwieciński', o1: '1.22', p2: 'Michał Skowronek', o2: '3.80', cat: 'K-1' },
            { id: 11, p1: 'Maksymilian Wiewiórka', o1: '3.50', p2: 'Alberto Simao', o2: '1.25', cat: 'MMA' },
            { id: 12, p1: 'Denis Załęcki', o1: '1.15', p2: 'Bartosz Szachta', o2: '4.70', cat: 'K-1' },
            { id: 13, p1: 'Jakub Flas', o1: '1.13', p2: 'Akop Szostak', o2: '5.00', cat: 'BOKS' },
            { id: 14, p1: 'Makhmud Muradov', o1: '1.23', p2: 'Denis Labryga', o2: '3.70', cat: 'MAIN EVENT K-1' }
        ];

        function App() {
            const [view, setView] = useState('home');
            const [nick, setNick] = useState('');
            const [picks, setPicks] = useState({});
            const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });
            const [status, setStatus] = useState('idle');
            const [showTerms, setShowTerms] = useState(true);
            const [toast, setToast] = useState({ show: false, msg: '' });
            const [isLogged, setIsLogged] = useState(false);
            const [officialResults, setOfficialResults] = useState({});
            const [userBet, setUserBet] = useState(JSON.parse(localStorage.getItem('fame_bet_30') || null));
            const [secretClicks, setSecretClicks] = useState(0);

            useEffect(() => {
                const resRef = db.ref('official_results');
                resRef.on('value', snap => setOfficialResults(snap.val() || {}));
                const timer = setInterval(() => {
                    const diff = DEADLINE - new Date();
                    setTimeLeft({
                        d: Math.max(0, Math.floor(diff / 86400000)),
                        h: Math.max(0, Math.floor((diff / 3600000) % 24)),
                        m: Math.max(0, Math.floor((diff / 60000) % 60)),
                        s: Math.max(0, Math.floor((diff / 1000) % 60))
                    });
                }, 1000);
                return () => { clearInterval(timer); resRef.off(); };
            }, []);

            const showNotify = (m) => { setToast({show:true, msg:m}); setTimeout(()=>setToast({show:false, msg:''}), 3000); };

            const submitBets = async (e) => {
                e.preventDefault();
                if (Object.keys(picks).length < FIGHTS.length) return alert("Musisz obstawić WSZYSTKIE walki!");
                setStatus('loading');
                try {
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            embeds: [{
                                title: `🔥 NOWY KUPON: ${nick}`,
                                color: 15844367,
                                fields: FIGHTS.map(f => ({ name: f.cat, value: `🥊 **${picks[f.id]}**`, inline: true })),
                                timestamp: new Date().toISOString()
                            }]
                        })
                    });
                    const betData = { nick, picks, date: new Date().toLocaleString() };
                    localStorage.setItem('fame_bet_30', JSON.stringify(betData));
                    setUserBet(betData);
                    setStatus('success');
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                } catch (e) { alert("Błąd połączenia!"); setStatus('idle'); }
            };

            const winStatus = (() => {
                if (!userBet) return null;
                const settledCount = Object.keys(officialResults).length;
                if (settledCount < FIGHTS.length) return 'WAITING';
                return FIGHTS.every(f => officialResults[f.id] === userBet.picks[f.id]) ? 'WIN' : 'LOSE';
            })();

            if (view === 'admin') {
                return (
                    <div className="min-h-screen p-6 max-w-xl mx-auto py-20">
                        {!isLogged ? (
                            <div className="card-bg p-10 rounded-[30px] border border-yellow-500/20 shadow-2xl">
                                <h2 className="fame-font gold-text text-xl mb-8 text-center uppercase tracking-widest italic">Panel Admina</h2>
                                <input id="l" className="w-full bg-zinc-900/50 border border-zinc-800 p-4 rounded-xl mb-4 text-white outline-none" placeholder="Login" />
                                <input id="p" type="password" title="pass" className="w-full bg-zinc-900/50 border border-zinc-800 p-4 rounded-xl mb-6 text-white outline-none" placeholder="Hasło" />
                                <button onClick={() => {if(document.getElementById('l').value==='qali09' && document.getElementById('p').value==='QaLi090909.') setIsLogged(true); else alert('Błąd!');}} className="w-full btn-gold py-4 rounded-xl uppercase">Zaloguj</button>
                                <button onClick={()=>setView('home')} className="w-full mt-4 text-zinc-600 text-[10px] uppercase font-bold tracking-widest italic">Anuluj</button>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <h2 className="fame-font gold-text text-2xl uppercase italic tracking-tighter text-center">Zatwierdź Wyniki Gali</h2>
                                <div className="card-bg p-4 rounded-[30px] space-y-3 max-h-[60vh] overflow-y-auto custom-scroll border border-white/5">
                                    {FIGHTS.map(f => (
                                        <div key={f.id} className="p-4 bg-black/40 rounded-2xl border border-zinc-900">
                                            <p className="text-[9px] text-zinc-500 font-black mb-3 uppercase tracking-widest">{f.cat}</p>
                                            <div className="grid grid-cols-2 gap-2">
                                                {[f.p1, f.p2].map(p => (
                                                    <button key={p} onClick={() => db.ref('official_results/' + f.id).set(p)}
                                                    className={`py-3 rounded-xl text-[10px] font-black transition-all border ${officialResults[f.id] === p ? 'bg-yellow-500 text-black border-white' : 'bg-zinc-900 border-zinc-800 text-zinc-600'}`}>{p.toUpperCase()}</button>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => { if(confirm("Czy na pewno wyczyścić wyniki?")) db.ref('official_results').remove(); }} className="w-full py-4 text-red-500 text-[10px] font-bold border border-red-500/20 rounded-xl uppercase hover:bg-red-500/5">Resetuj wszystkie wyniki</button>
                                <button onClick={() => setView('home')} className="w-full btn-gold py-5 rounded-2xl uppercase shadow-xl">Wróć do strony głównej</button>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Toast Notification */}
                    <div className={`fixed top-10 right-10 z-[300] p-5 rounded-2xl card-bg border-l-4 border-l-yellow-500 shadow-2xl flex items-center gap-4 ${toast.show ? 'toast-show' : 'toast-hide'}`}>
                        <div className="bg-yellow-500 text-black w-8 h-8 rounded-full flex items-center justify-center font-black">!</div>
                        <div><p className="text-[10px] text-zinc-500 font-black uppercase">Komunikat</p><p className="text-xs font-bold text-white">{toast.msg}</p></div>
                    </div>

                    {showTerms && (
                        <div className="fixed inset-0 z-[500] flex items-center justify-center p-4 blur-bg">
                            <div className="card-bg w-full max-w-md p-10 rounded-[45px] border border-yellow-500/30 text-center shadow-[0_0_100px_rgba(212,175,55,0.1)]">
                                <h2 className="fame-font gold-text text-5xl mb-2 italic uppercase font-black tracking-tighter">FAME 30</h2>
                                <p className="text-zinc-500 text-[10px] font-black tracking-[0.4em] uppercase mb-10 italic">Weryfikacja Zawodnika</p>
                                <div className="text-zinc-400 text-[11px] text-left space-y-4 mb-10 italic bg-black/80 p-6 rounded-3xl border border-zinc-800/50">
                                    <p className="font-black text-yellow-500 uppercase tracking-[0.2em] text-center border-b border-zinc-800 pb-2">Zasady Obstawiaka</p>
                                    <p>1. Możesz wysłać <b>tylko jeden kupon</b> na to urządzenie.</p>
                                    <p>2. Aby wygrać, musisz poprawnie wytypować wszystkie 14 walk.</p>
                                    <p>3. Po zatwierdzeniu nie ma możliwości zmiany typów.</p>
                                </div>
                                <button onClick={() => { setShowTerms(false); showNotify(userBet ? "Witaj ponownie!" : "Powodzenia w typowaniu!"); }} 
                                className="w-full btn-gold py-6 rounded-2xl uppercase tracking-[0.2em] text-xs animate-gold">WCHODZĘ DO GRY</button>
                            </div>
                        </div>
                    )}

                    <div className={`max-w-2xl mx-auto py-12 px-6 transition-all duration-700 ${showTerms ? 'blur-2xl' : 'blur-0'}`}>
                        <header className="text-center mb-16 select-none relative">
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-yellow-500/10 rounded-full blur-[80px] -z-10"></div>
                            <h1 onClick={() => {const c=secretClicks+1; setSecretClicks(c); if(c===5) setView('admin');}} 
                                className="fame-font text-8xl font-black italic gold-text mb-6 tracking-tighter drop-shadow-[0_10px_30px_rgba(212,175,55,0.3)] cursor-default">FAME 30</h1>
                            
                            <div className="flex justify-center gap-3">
                                {[{v:timeLeft.d,l:'DNI'},{v:timeLeft.h,l:'GODZ'},{v:timeLeft.m,l:'MIN'},{v:timeLeft.s,l:'SEK'}].map(t=>(
                                    <div key={t.l} className="bg-zinc-900/40 border border-zinc-800/50 w-16 py-3 rounded-2xl">
                                        <div className="text-xl font-black fame-font italic text-white">{String(t.v).padStart(2,'0')}</div>
                                        <div className="text-[8px] uppercase text-zinc-600 font-black tracking-widest">{t.l}</div>
                                    </div>
                                ))}
                            </div>
                        </header>

                        {userBet ? (
                            <div className="space-y-8 animate-[fadeIn_1s_ease]">
                                <div className="text-center">
                                    {winStatus === 'WAITING' && <div className="bg-yellow-500/5 border border-yellow-500/20 p-8 rounded-[40px]"><div className="w-10 h-10 border-2 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div><h2 className="fame-font gold-text text-xl uppercase italic tracking-widest">KUPON W GRZE...</h2><p className="text-[10px] text-zinc-500 mt-2 font-bold uppercase tracking-widest">Czekamy na oficjalne wyniki walk</p></div>}
                                    {winStatus === 'WIN' && <div className="bg-green-500/10 border-2 border-green-500 p-8 rounded-[40px]"><h2 className="fame-font text-green-500 text-4xl italic uppercase font-black">WYGRAŁEŚ! 🏆</h2><p className="bg-green-500 text-black inline-block px-4 py-2 mt-4 rounded-lg font-black text-[10px] uppercase">Zrób screen i wyślij na Discord!</p></div>}
                                    {winStatus === 'LOSE' && <div className="bg-red-500/5 border border-red-500/20 p-8 rounded-[40px]"><h2 className="fame-font text-red-500 text-2xl italic uppercase opacity-60">Kupon Przegrany</h2></div>}
                                </div>

                                <div id="ticket" className="ticket-gradient p-10 rounded-[50px] border-2 border-yellow-500 shadow-[0_30px_60px_rgba(0,0,0,0.5)]">
                                    <div className="flex justify-between items-start mb-10 border-b border-zinc-800 pb-6">
                                        <div>
                                            <p className="text-zinc-600 text-[8px] font-black uppercase tracking-[0.3em] mb-1">POSIADACZ KUPONU</p>
                                            <p className="text-2xl font-black fame-font text-white italic uppercase">{userBet.nick}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-zinc-600 text-[8px] font-black uppercase tracking-[0.3em] mb-1">STATUS</p>
                                            <p className="text-sm font-black fame-font gold-text italic">ZWERYFIKOWANO</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-2">
                                        {FIGHTS.map(f => {
                                            const res = officialResults[f.id];
                                            const isCorrect = res ? (res === userBet.picks[f.id]) : null;
                                            return (
                                                <div key={f.id} className="flex justify-between items-center py-2 border-b border-white/5 italic">
                                                    <span className="text-[9px] text-zinc-500 font-bold uppercase w-24 text-left">{f.cat}</span>
                                                    <span className={`text-[10px] font-black uppercase tracking-tight flex-1 text-center ${isCorrect===true?'text-green-400':isCorrect===false?'text-red-500':'text-zinc-200'}`}>{userBet.picks[f.id]}</span>
                                                    <span className="w-8 text-right">{isCorrect === true ? '✅' : isCorrect === false ? '❌' : '⏳'}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <div className="mt-10 pt-6 border-t border-zinc-800 flex justify-between items-center">
                                        <div className="text-[7px] text-zinc-700 font-black tracking-[0.5em] uppercase">FAME 30 OFFICIAL SYSTEM</div>
                                        <div className="text-[7px] text-zinc-700 font-black uppercase">{userBet.date}</div>
                                    </div>
                                </div>

                                <button onClick={() => html2canvas(document.getElementById('ticket'), {backgroundColor:'#050505', scale:2}).then(c => { const a = document.createElement('a'); a.download=`FAME30_${userBet.nick}.png`; a.href=c.toDataURL(); a.click(); })} 
                                className="w-full btn-gold py-6 rounded-[25px] text-xs font-black uppercase shadow-2xl transition-transform active:scale-95">Pobierz Kupon jako PNG</button>
                            </div>
                        ) : (
                            <form onSubmit={submitBets} className="space-y-6">
                                <div className="card-bg p-8 rounded-[35px] border border-zinc-800/50">
                                    <label className="block text-zinc-600 text-[10px] font-black uppercase text-center mb-4 tracking-[0.2em] italic underline">Twój Nick z Discorda</label>
                                    <input required className="w-full bg-black/60 border border-zinc-800 p-5 rounded-2xl text-center text-xl font-bold focus:border-yellow-500 transition-all outline-none uppercase text-white placeholder:text-zinc-800" placeholder="NICK#0000" value={nick} onChange={e=>setNick(e.target.value.toUpperCase())} />
                                </div>

                                <div className="space-y-4">
                                    {FIGHTS.map(f => (
                                        <div key={f.id} className="card-bg p-6 rounded-[35px] border border-white/5 hover:border-yellow-500/20 transition-all group">
                                            <p className="text-center text-[9px] text-zinc-600 font-black mb-6 uppercase tracking-[0.5em] italic group-hover:text-yellow-500 transition-colors">{f.cat}</p>
                                            <div className="grid grid-cols-2 gap-4">
                                                <button type="button" onClick={() => {setPicks(p=>({...p, [f.id]:f.p1})); showNotify(`Wybrałeś: ${f.p1}`);}} 
                                                    className={`relative overflow-hidden py-6 rounded-2xl font-black text-[11px] transition-all border-2 ${picks[f.id]===f.p1?'btn-gold border-white scale-[1.03] shadow-lg shadow-yellow-500/10':'bg-zinc-900/50 border-zinc-800 text-zinc-500 hover:border-zinc-700'}`}>
                                                    <span className="relative z-10">{f.p1.toUpperCase()}</span>
                                                    <span className="absolute top-1 right-2 text-[8px] opacity-30 italic">{f.o1}</span>
                                                </button>
                                                <button type="button" onClick={() => {setPicks(p=>({...p, [f.id]:f.p2})); showNotify(`Wybrałeś: ${f.p2}`);}} 
                                                    className={`relative overflow-hidden py-6 rounded-2xl font-black text-[11px] transition-all border-2 ${picks[f.id]===f.p2?'btn-gold border-white scale-[1.03] shadow-lg shadow-yellow-500/10':'bg-zinc-900/50 border-zinc-800 text-zinc-500 hover:border-zinc-700'}`}>
                                                    <span className="relative z-10">{f.p2.toUpperCase()}</span>
                                                    <span className="absolute top-1 right-2 text-[8px] opacity-30 italic">{f.o2}</span>
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button type="submit" disabled={status==='loading'} className="w-full btn-gold py-8 rounded-[40px] text-2xl font-black italic uppercase animate-gold disabled:opacity-50 mt-10 shadow-[0_20px_40px_rgba(212,175,55,0.2)] transition-transform active:scale-95">
                                    {status === 'loading' ? 'WYSYŁANIE...' : 'ZATWIERDŹ KUPON'}
                                </button>
                            </form>
                        )}
                        
                        <footer className="mt-24 text-center">
                            <p className="text-[9px] fame-font tracking-[1.5em] uppercase italic text-zinc-800">CLOUD AI RESTREAM SYSTEM</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
