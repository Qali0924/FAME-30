    <style>

        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }

        .fame-font { font-family: 'Orbitron', sans-serif; }

        .gold-text { color: #d4af37; }

        .btn-gold { background: linear-gradient(45deg, #d4af37, #f4cf57); color: black; font-weight: 900; }

        .card-bg { background: #0f0f0f; border: 1px solid #1a1a1a; }

        .timer-box { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); }

        .ticket-gradient { background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%); border: 2px solid #d4af37; }

        .toast-show { transform: translateX(0); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .toast-hide { transform: translateX(150%); transition: transform 0.5s ease-in; }

        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 5px rgba(212,175,55,0.2); } 50% { box-shadow: 0 0 20px rgba(212,175,55,0.4); } }

        .animate-gold { animation: pulse-gold 3s infinite; }

        .blur-bg { backdrop-filter: blur(15px); background: rgba(0,0,0,0.9); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }

        .custom-scroll::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }

        

        .buy-popup {

            position: fixed;

            bottom: 40px;

            left: 50%;

            transform: translateX(-50%);

            z-index: 9999;

            animation: slideUp 0.5s ease-out;

        }

        @keyframes slideUp {

            from { bottom: -100px; opacity: 0; }

            to { bottom: 40px; opacity: 1; }

        }

        .btn-buy-anim {

            background: linear-gradient(45deg, #ff0000, #d4af37);

            color: white;

            box-shadow: 0 0 20px rgba(212,175,55,0.5);

            transition: all 0.3s ease;

        }

        .btn-buy-anim:hover {

            transform: scale(1.1);

            box-shadow: 0 0 40px rgba(255,0,0,0.6);

        }

        .f30-coin {
            display: inline-flex; justify-content: center; align-items: center;
            border-radius: 50%;
            background: radial-gradient(circle, #f4cf57, #d4af37);
            border: 2px solid #8b6508; color: black; font-weight: 900;
            font-family: 'Orbitron', sans-serif; font-style: italic;
            box-shadow: 0 0 15px rgba(212,175,55,0.4), inset 0 0 5px rgba(255,255,255,0.5);
            animation: spin-coin 3s linear infinite;
        }

        @keyframes spin-coin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .fc-slider {
            -webkit-appearance: none; width: 100%; height: 6px; background: #2a2a2a; border-radius: 5px; outline: none;
        }

        .fc-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%;
            background: linear-gradient(45deg, #d4af37, #f4cf57); cursor: pointer; box-shadow: 0 0 10px rgba(212,175,55,0.7);
        }

        .nav-tab {
            transition: all 0.3s ease;
            position: relative;
        }
        .nav-tab.active {
            color: #d4af37;
        }
        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #d4af37;
            box-shadow: 0 0 10px #d4af37;
        }

        @keyframes case-spin {
            0% { transform: scale(1); filter: blur(0px); }
            50% { transform: scale(1.1); filter: blur(2px); }
            100% { transform: scale(1); filter: blur(0px); }
        }
        .spinning {
            animation: case-spin 0.2s infinite;
        }

    </style>

</head>

            { id: 3, p1: 'Oskar Wierzejski', p2: 'Klaudiusz Mazanowski', cat: 'MMA' },

            { id: 4, p1: 'Michał Pasternak', p2: 'Michał Królik', cat: 'BOKS' },

            { id: 5, p1: 'Nikola Biela', p2: 'Żaneta Koloska', cat: 'K-1' },

            { id: 6, p1: 'Łukasz Pawłowski', p2: 'Nikodem Sławik', cat: 'K-1 / MMA' },

            { id: 12, p1: 'Denis Załęcki', p2: 'Bartosz Szachta', cat: 'K-1' },

            { id: 13, p1: 'Jakub Flas', p2: 'Akop Szostak', cat: 'BOKS' },

        ];



        function App() {

            const [view, setView] = useState('home');

            const [nick, setNick] = useState('');

            const [picks, setPicks] = useState({});

            const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });

            const [status, setStatus] = useState('idle');

            const [showTerms, setShowTerms] = useState(true);

            const [toast, setToast] = useState({ show: false, msg: '' });

            const [isLogged, setIsLogged] = useState(false);

            const [officialResults, setOfficialResults] = useState({});

            const [userBet, setUserBet] = useState(JSON.parse(localStorage.getItem('fame_bet_30') || null));

            const [secretClicks, setSecretClicks] = useState(0);

            const [showBuyBtn, setShowBuyBtn] = useState(false);

            const [showFighterCard, setShowFighterCard] = useState(false);

            const [totalBets, setTotalBets] = useState(0);

            const [isBettingLocked, setIsBettingLocked] = useState(false);

            // NOWE STANY DLA ZAKŁADEK I KASYNA
            const [currentTab, setCurrentTab] = useState('ticket'); // ticket | store | casino
            const [isSpinning, setIsSpinning] = useState(false);
            const [spinResult, setSpinResult] = useState(null);



            const audioRefs = useRef({

                click: new Audio(soundUrls.click),

                success: new Audio(soundUrls.success),

                notify: new Audio(soundUrls.notify)

            });



            useEffect(() => {

                const resRef = db.ref('official_results');

                resRef.on('value', snap => setOfficialResults(snap.val() || {}));



                const betsRef = db.ref('wszystkie_kupony');

                betsRef.on('value', snap => {
                    const data = snap.val() || {};
                    const parsedBets = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                    setAllBets(parsedBets);
                    setTotalBets(parsedBets.length);
                });

                const configRef = db.ref('config/betting_locked');
                configRef.on('value', snap => setIsBettingLocked(snap.val() || false));



                const timer = setInterval(() => {

                    const diff = DEADLINE - new Date();

                    setTimeLeft({

                        d: Math.max(0, Math.floor(diff / 86400000)),

                        h: Math.max(0, Math.floor((diff / 3600000) % 24)),

                        m: Math.max(0, Math.floor((diff / 60000) % 60)),

                        s: Math.max(0, Math.floor((diff / 1000) % 60))

                    });

                }, 1000);



                let buyInterval;

                if (!showTerms && view !== 'admin') {

                    buyInterval = setInterval(() => {

                        setShowBuyBtn(true);

                        setTimeout(() => setShowBuyBtn(false), 8000);

                    }, 15000);

                }



                return () => { 

                    clearInterval(timer); 

                    if(buyInterval) clearInterval(buyInterval); 

                    resRef.off(); 

                    betsRef.off();
                    configRef.off();

                };

            }, [showTerms, view]);



            const playSound = (name) => {

                const sound = audioRefs.current[name];

                if (sound) { sound.currentTime = 0; sound.volume = 0.5; sound.play().catch(() => {}); }

            };



            const unlockAudio = () => {

                Object.values(audioRefs.current).forEach(s => { s.play().then(()=>s.pause()).catch(()=>{}); });

                setShowTerms(false);

                showNotify(userBet ? "Witaj ponownie!" : "Powodzenia w typowaniu!");

            };



            const showNotify = (msg) => {

                playSound('notify');

                setToast({ show: true, msg });

                setTimeout(() => setToast({ show: false, msg: '' }), 4000);

            };



            const handleAdminLogin = async () => {
                const l = document.getElementById('l').value;
                const p = document.getElementById('p').value;
                try {
                    const snap = await db.ref('admin_auth').once('value');
                    const auth = snap.val();
                    
                    if (!auth) {
                        if (l === 'qali09' && p === 'QaLi090909.') {
                            await db.ref('admin_auth').set({ user: l, pass: btoa(p) });
                            setIsLogged(true);
                        } else alert('Błąd! Złe dane.');
                    } else {
                        if (auth.user === l && atob(auth.pass) === p) setIsLogged(true);
                        else alert('Błąd logowania! Niepoprawne hasło.');
                    }
                } catch(e) {
                    alert('Błąd połączenia z bazą!');
                }
            };



            const remainingBalance = 1000 - Object.values(picks).reduce((sum, p) => sum + (p.stake || 0), 0);

            const handlePick = (fId, fighter) => {

                if (userBet || isBettingLocked) return;

                playSound('click');

                setPicks(prev => {
                    const currentStake = prev[fId]?.stake || 0;
                    return { ...prev, [fId]: { fighter, stake: currentStake } };
                });

            };



            const submitBets = async (e) => {

                e.preventDefault();

                if (Object.keys(picks).length < FIGHTS.length) return alert("Obstaw wszystkich zawodników!");

                setStatus('loading');

                try {

                    await db.ref('wszystkie_kupony').push({

                        nick: nick,

                        typy: picks,

                        data: new Date().toISOString(),
                        walletModifier: 0 // DO OBSŁUGI SKLEPU I KASYNA

                    });



                    await fetch(WEBHOOK_URL, {

                        method: 'POST',

                        headers: { 'Content-Type': 'application/json' },

                        body: JSON.stringify({

                            username: "FAME 30 | SYSTEM",

                            embeds: [{

                                title: `🎯 NOWY KUPON: ${nick}`,

                                color: 15844367,

                                fields: FIGHTS.map(f => {
                                    const p = picks[f.id];
                                    return { name: f.cat, value: `🥊 **${p?.fighter || 'Brak'}**\n💰 ${p?.stake || 0} FC`, inline: true };
                                }),

                                timestamp: new Date().toISOString()

                            }]

                        })

                    });

                    const betData = { nick, picks, date: new Date().toLocaleString() };

                    localStorage.setItem('fame_bet_30', JSON.stringify(betData));

                    setUserBet(betData);

                    setStatus('success');

                    playSound('success');

                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

                } catch (e) { alert("Błąd połączenia z bazą!"); setStatus('idle'); }

            };



            // ZAAWANSOWANE OBLICZANIE PORTFELA (Z UWZGLĘDNIENIEM SKLEPU I KASYNA)
            const userCurrentBalance = useMemo(() => {
                if (!userBet) return 1000;
                let bal = 1000;
                
                // Oblicz wygrane z walk
                if(userBet.picks) {
                    Object.entries(userBet.picks).forEach(([fId, pickData]) => {
                        const stake = pickData.stake || 0;
                        const fighter = pickData.fighter || pickData;
                        bal -= stake;
                        
                        if (officialResults[fId] === fighter) bal += (stake * 2); 
                        else if (officialResults[fId] === 'REMIS') bal += stake; 
                    });
                }

                // Dodaj/Odejmij modyfikatory ze sklepu/kasyna
                const userDbObj = allBets.find(b => b.nick === userBet.nick);
                if (userDbObj && userDbObj.walletModifier) {
                    bal += userDbObj.walletModifier;
                }

                return bal;
            }, [userBet, officialResults, allBets]);

            const winStatus = (() => {
                if (!userBet) return null;
                const settled = Object.keys(officialResults).length;
                if (settled < FIGHTS.length) return 'WAITING';
                return FIGHTS.every(f => {
                    const pick = userBet.picks[f.id]?.fighter || userBet.picks[f.id];
                    return officialResults[f.id] === pick || officialResults[f.id] === 'REMIS';
                }) ? 'WIN' : 'LOSE';
            })();


            const leaderboard = useMemo(() => {
                if (!allBets || allBets.length === 0) return [];
                return allBets.map(bet => {
                    let bal = 1000;
                    if (bet.typy) {
                        Object.entries(bet.typy).forEach(([fId, pickData]) => {
                            const stake = pickData.stake || 0;
                            const fighter = pickData.fighter || pickData;
                            bal -= stake;
                            if (officialResults[fId] === fighter) bal += (stake * 2);
                            else if (officialResults[fId] === 'REMIS') bal += stake;
                        });
                    }
                    if (bet.walletModifier) bal += bet.walletModifier;

                    return { nick: bet.nick || 'Nieznany', balance: bal };
                }).sort((a, b) => b.balance - a.balance).slice(0, 10);
            }, [allBets, officialResults]);


            const getFightStats = (fightId) => {
                if (!allBets || allBets.length === 0) return { p1: 0, p2: 0, total: 0 };
                let p1Count = 0;
                let p2Count = 0;
                const f = FIGHTS.find(x => x.id === fightId);
                allBets.forEach(bet => {
                    if(bet.typy && bet.typy[fightId]) {
                        const pick = bet.typy[fightId].fighter || bet.typy[fightId];
                        if(pick === f.p1) p1Count++;
                        else if(pick === f.p2) p2Count++;
                    }
                });
                const total = p1Count + p2Count;
                return {
                    p1: total ? Math.round((p1Count / total) * 100) : 0,
                    p2: total ? Math.round((p2Count / total) * 100) : 0,
                    total
                };
            };


            // LOGIKA ZMIANY SALDA BAZY DANYCH (ZAKUPY / KASYNO)
            const modifyDatabaseWallet = async (amount) => {
                const userDbObj = allBets.find(b => b.nick === userBet.nick);
                if (userDbObj && userDbObj.id) {
                    const currentMod = userDbObj.walletModifier || 0;
                    await db.ref(`wszystkie_kupony/${userDbObj.id}/walletModifier`).set(currentMod + amount);
                }
            };

            // LOGIKA SKLEPU
            const handleBuyStoreItem = async (itemName, cost) => {
                if (userCurrentBalance < cost) {
                    return showNotify("Masz za mało Famecoinów!");
                }
                if (confirm(`Czy na pewno chcesz kupić: ${itemName} za ${cost} FC?`)) {
                    await modifyDatabaseWallet(-cost);
                    playSound('success');
                    showNotify(`Zakupiono: ${itemName}! Zgłoś się na Discord.`);
                    
                    // Powiadomienie Webhook
                    fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: "FAME STORE",
                            content: `🛒 **${userBet.nick}** właśnie kupił w sklepie: **${itemName}** za ${cost} FC!`
                        })
                    });
                }
            };

            // LOGIKA KASYNA / SKRZYNEK
            const openCase = async (caseName, cost, drops) => {
                if (isSpinning) return;
                if (userCurrentBalance < cost) {
                    return showNotify("Masz za mało Famecoinów!");
                }

                setSpinResult(null);
                setIsSpinning(true);
                playSound('click');

                // Zabieramy kase za otworzenie skrzynki
                await modifyDatabaseWallet(-cost);

                // Symulacja losowania
                setTimeout(async () => {
                    const rand = Math.random();
                    let wonAmount = 0;
                    let cumProb = 0;
                    
                    for (const drop of drops) {
                        cumProb += drop.chance;
                        if (rand <= cumProb) {
                            wonAmount = drop.amount;
                            break;
                        }
                    }

                    if (wonAmount > 0) {
                        await modifyDatabaseWallet(wonAmount);
                        playSound('success');
                        if (wonAmount >= cost * 2) {
                            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                            
                            // Webhook o potężnej wygranej
                            if(wonAmount >= 1000) {
                                fetch(WEBHOOK_URL, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ content: `🎰 **JACKPOT!** Gracz **${userBet.nick}** wylosował z kasyna aż **${wonAmount} FC**!`})
                                });
                            }
                        }
                    } else {
                        playSound('click'); // smutny dzwiek mozna dodac
                    }

                    setSpinResult(`Znalazłeś: ${wonAmount} FC`);
                    setIsSpinning(false);
                }, 3000); // 3 sekundy krecenia
            };



            if (view === 'admin') {

                return (

                    <div className="min-h-screen p-8 max-w-[800px] mx-auto py-20">

                        {!isLogged ? (

                            <div className="card-bg p-8 rounded-3xl border border-yellow-500/20 max-w-sm mx-auto">

                                <input id="l" className="w-full bg-zinc-900 p-4 rounded-xl mb-4 border border-zinc-800 text-white outline-none" placeholder="Login" />

                                <input id="p" type="password" title="pass" className="w-full bg-zinc-900 p-4 rounded-xl mb-6 border border-zinc-800 text-white outline-none" placeholder="Hasło" />

                                <button onClick={handleAdminLogin} className="w-full btn-gold py-4 rounded-xl uppercase font-black">Wejdź</button>

                                <button onClick={()=>setView('home')} className="w-full mt-4 text-zinc-600 text-[10px] uppercase italic underline">Anuluj</button>

                            </div>

                        ) : (

                            <div className="space-y-8 animate-in fade-in zoom-in-95 duration-500">

                                <h2 className="fame-font gold-text text-3xl uppercase italic text-center drop-shadow-[0_0_15px_rgba(212,175,55,0.3)]">PANEL ADMINA</h2>
                                
                                <div className="card-bg p-6 rounded-3xl border border-zinc-800 shadow-xl">
                                    <h3 className="text-zinc-400 text-xs font-bold uppercase tracking-widest mb-4">Status Obstawiania</h3>
                                    <button 
                                        onClick={() => db.ref('config/betting_locked').set(!isBettingLocked)}
                                        className={`w-full py-5 rounded-2xl font-black uppercase tracking-widest text-sm transition-all shadow-lg ${isBettingLocked ? 'bg-red-500/10 text-red-500 border border-red-500/50 hover:bg-red-500/20' : 'bg-green-500/10 text-green-500 border border-green-500/50 hover:bg-green-500/20'}`}
                                    >
                                        {isBettingLocked ? 'ZABLOKOWANE (Trwa Gala) - Kliknij by odblokować' : 'ODBLOKOWANE - Kliknij by Zablokować'}
                                    </button>
                                </div>

                                <div className="card-bg p-6 rounded-3xl border border-zinc-800 shadow-xl space-y-4">
                                    <h3 className="text-zinc-400 text-xs font-bold uppercase tracking-widest mb-4">Wyniki Walk & Głosy Widzów</h3>
                                    <div className="space-y-4 max-h-[50vh] overflow-y-auto custom-scroll pr-2">
                                        {FIGHTS.map(f => {
                                            const stats = getFightStats(f.id);
                                            return (
                                                <div key={f.id} className="p-4 bg-black/40 rounded-2xl border border-zinc-900 relative overflow-hidden">
                                                    <p className="text-[10px] text-zinc-500 font-bold mb-3 uppercase flex justify-between">
                                                        <span>{f.cat}</span>
                                                        <span className="text-yellow-500 drop-shadow-md">Suma Głosów: {stats.total}</span>
                                                    </p>
                                                    
                                                    {stats.total > 0 && (
                                                        <div className="flex w-full h-1.5 bg-zinc-800 rounded-full mb-4 overflow-hidden shadow-inner">
                                                            <div style={{width: `${stats.p1}%`}} className="bg-yellow-500 h-full transition-all duration-1000"></div>
                                                            <div style={{width: `${stats.p2}%`}} className="bg-zinc-400 h-full transition-all duration-1000"></div>
                                                        </div>
                                                    )}

                                                    <div className="grid grid-cols-3 gap-2">
                                                        {[f.p1, 'REMIS', f.p2].map((p, idx) => (
                                                            <button key={p} onClick={() => db.ref('official_results/' + f.id).set(p)}
                                                            className={`py-3 rounded-xl text-[9px] font-black transition-all border flex flex-col items-center justify-center gap-1.5 ${officialResults[f.id] === p ? (p==='REMIS' ? 'bg-zinc-600 text-white border-white' : 'bg-yellow-500 text-black border-white') : 'bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-yellow-500/50 hover:text-white'}`}>

                                                {currentPick && (
                                                    <div className="mt-6 p-4 bg-black/40 rounded-2xl border border-zinc-800/50 animate-in fade-in slide-in-from-top-2">
                                                        <div className="flex justify-between text-[10px] font-black uppercase tracking-widest mb-3">
                                                            <span className="text-zinc-400">Stawka: <span className="text-yellow-500">{currentPick.stake} FC</span></span>
                                                            <span className="text-zinc-400">Wygrana: <span className="text-green-500">+{currentPick.stake * 2} FC</span></span>
                                                        </div>
                                                        <input 
                                                            type="range" 
                                                            min="0" 
                                                            max={remainingBalance + currentPick.stake} 
                                                            step="10"
                                                            value={currentPick.stake} 
                                                            onChange={(e) => {
                                                                const val = parseInt(e.target.value);
                                                                setPicks(prev => ({...prev, [f.id]: {...prev[f.id], stake: val}}));
                                                            }}
                                                            className="fc-slider" 
                                                        />
                                                    </div>
                                                )}

                                            </div>

                                        );
                                    })}

                                </div>



                                <button type="submit" disabled={status==='loading'} className="w-full btn-gold py-8 rounded-[40px] text-2xl font-black italic shadow-2xl uppercase tracking-tighter animate-gold disabled:opacity-50 mt-10">

                                    {status === 'loading' ? 'WYSYŁANIE...' : 'ZATWIERDŹ KUPON'}

                                </button>

                            </form>

                        )}


                        {/* LEADERBOARD / TOP 10 (Zawsze widoczne na dole) */}
                        <div className="mt-20 card-bg p-8 rounded-3xl border border-yellow-500/20 shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-yellow-500 to-transparent opacity-50"></div>
                            <h2 className="fame-font gold-text text-2xl md:text-3xl mb-8 text-center italic uppercase flex items-center justify-center gap-4 drop-shadow-[0_0_10px_rgba(212,175,55,0.2)]">
                                <div className="f30-coin hidden md:flex" style={{width:'28px',height:'28px',fontSize:'9px'}}>F30</div>
                                TOP 10 BOGACZY
                                <div className="f30-coin hidden md:flex" style={{width:'28px',height:'28px',fontSize:'9px'}}>F30</div>
                            </h2>
                            <div className="space-y-3 relative z-10">
                                {leaderboard.length === 0 ? (
                                    <p className="text-center text-zinc-500 text-xs uppercase italic font-bold">Brak danych...</p>
                                ) : (
                                    leaderboard.map((user, idx) => (
                                        <div key={idx} className="flex justify-between items-center bg-black/60 p-4 rounded-2xl border border-zinc-800/80 hover:border-yellow-500/30 transition-colors">
                                            <div className="flex items-center gap-4">
                                                <span className={`fame-font text-xl italic font-black ${idx === 0 ? 'text-yellow-400 drop-shadow-[0_0_10px_rgba(250,204,21,0.5)]' : idx === 1 ? 'text-zinc-300' : idx === 2 ? 'text-amber-700' : 'text-zinc-600'}`}>#{idx + 1}</span>
                                                <span className="text-white font-bold uppercase tracking-wider text-xs md:text-sm">{user.nick}</span>
                                            </div>
                                            <span className="gold-text font-black flex items-center gap-2 text-md md:text-lg">
                                                {user.balance} <div className="f30-coin" style={{width:'18px',height:'18px',fontSize:'6px'}}>F30</div>
                                            </span>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        

                        <footer className="mt-20 text-center opacity-20">

                            <p className="text-[8px] fame-font tracking-[1em] uppercase select-none italic">RESTREAM © 2026</p>

                        </footer>

                    </div>

                </div>

            );

        }



        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<App />);

    </script>

</body>

</html>
