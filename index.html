<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSTAWIANIE | RESTREAM</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        .fame-font { font-family: 'Orbitron', sans-serif; }
        .gold-text { color: #d4af37; }
        .btn-gold { background: linear-gradient(45deg, #d4af37, #f4cf57); color: black; font-weight: 900; }
        .card-bg { background: #0f0f0f; border: 1px solid #1a1a1a; }
        .timer-box { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); }
        .ticket-gradient { background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%); border: 2px solid #d4af37; }
        .toast-show { transform: translateX(0); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast-hide { transform: translateX(150%); transition: transform 0.5s ease-in; }
        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 5px rgba(212,175,55,0.2); } 50% { box-shadow: 0 0 20px rgba(212,175,55,0.4); } }
        .animate-gold { animation: pulse-gold 3s infinite; }
        .blur-bg { backdrop-filter: blur(15px); background: rgba(0,0,0,0.9); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
        
        .fame-coin {
            width: 44px; height: 44px;
            background: radial-gradient(circle, #ffd700, #b8860b);
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: #000; font-weight: 900; font-size: 11px;
            border: 2px solid #f1c40f;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            animation: coin-spin 3s linear infinite;
        }
        @keyframes coin-spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .buy-popup { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 9999; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { bottom: -100px; opacity: 0; } to { bottom: 40px; opacity: 1; } }
        .btn-buy-anim { background: linear-gradient(45deg, #ff0000, #d4af37); color: white; box-shadow: 0 0 20px rgba(212,175,55,0.5); transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDSW1Rbw-gDY_JQ9YTrdb3lrJCZf0aAWyw",
            authDomain: "fame-30.firebaseapp.com",
            databaseURL: "https://fame-30-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fame-30",
            storageBucket: "fame-30.firebasestorage.app",
            messagingSenderId: "447768289074",
            appId: "1:447768289074:web:49ce781e967ab86417812b"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const WEBHOOK_URL = "https://discord.com/api/webhooks/1482735762553176105/vCpLZNRhwP8bUYget_Aqf5e7ll6bBqvHTw3-HzvNeGyP";
        const DISCORD_LINK = "https://discord.gg/4MFDzTTFsH"; 
        const DEADLINE = new Date('2026-03-21T19:30:00'); 
        
        const FIGHTS = [
            { id: 1, p1: 'Monika Weitz', p2: 'Wiktoria Zagacka', cat: 'BOKS' },
            { id: 2, p1: 'Krystian Jakiel', p2: 'Piotr Szewc', cat: 'BOKS' },
            { id: 3, p1: 'Oskar Wierzejski', p2: 'Klaudiusz Mazanowski', cat: 'MMA' },
            { id: 4, p1: 'Michał Pasternak', p2: 'Michał Królik', cat: 'BOKS' },
            { id: 5, p1: 'Nikola Biela', p2: 'Żaneta Koloska', cat: 'K-1' },
            { id: 6, p1: 'Łukasz Pawłowski', p2: 'Nikodem Sławik', cat: 'K-1 / MMA' },
            { id: 7, p1: 'Robert Karaś', p2: 'Kasper Gutkowski', cat: 'BOKS / K-1' },
            { id: 8, p1: 'Krzyżanowski/Bazyluk', p2: 'Stępień/Fares', cat: '2vs2 MMA/BOKS' },
            { id: 9, p1: 'Marta Linkiewicz', p2: 'Izabela Badurek', cat: 'K-1' },
            { id: 10, p1: 'Alan Kwieciński', p2: 'Michał Skowronek', cat: 'K-1' },
            { id: 11, p1: 'Maksymilian Wiewiórka', p2: 'Alberto Simao', cat: 'MMA' },
            { id: 12, p1: 'Denis Załęcki', p2: 'Bartosz Szachta', cat: 'K-1' },
            { id: 13, p1: 'Jakub Flas', p2: 'Akop Szostak', cat: 'BOKS' },
            { id: 14, p1: 'Makhmud Muradov', p2: 'Denis Labryga', cat: 'MAIN EVENT K-1' }
        ];

        function App() {
            const [view, setView] = useState('home');
            const [nick, setNick] = useState('');
            const [picks, setPicks] = useState({});
            const [stakes, setStakes] = useState({});
            const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });
            const [status, setStatus] = useState('idle');
            const [showTerms, setShowTerms] = useState(true);
            const [toast, setToast] = useState({ show: false, msg: '' });
            const [isLogged, setIsLogged] = useState(false);
            const [officialResults, setOfficialResults] = useState({});
            const [userBet, setUserBet] = useState(JSON.parse(localStorage.getItem('fame_bet_30') || null));
            const [ranking, setRanking] = useState([]);
            const [totalBets, setTotalBets] = useState(0);
            const [secretClicks, setSecretClicks] = useState(0);
            const [showBuyBtn, setShowBuyBtn] = useState(false);
            const [showFighterCard, setShowFighterCard] = useState(false);

            useEffect(() => {
                const resRef = db.ref('official_results');
                resRef.on('value', snap => setOfficialResults(snap.val() || {}));

                const betsRef = db.ref('wszystkie_kupony');
                betsRef.on('value', snap => {
                    const data = snap.val() || {};
                    setTotalBets(Object.keys(data).length);
                    const leaderboard = Object.values(data).map(user => {
                        let pts = 1000;
                        if (user.stakes) {
                            Object.keys(user.typy).forEach(fId => {
                                if (officialResults[fId]) {
                                    if (officialResults[fId] === user.typy[fId]) pts += parseInt(user.stakes[fId] || 0);
                                    else pts -= parseInt(user.stakes[fId] || 0);
                                }
                            });
                        }
                        return { nick: user.nick, points: pts };
                    }).sort((a, b) => b.points - a.points).slice(0, 10);
                    setRanking(leaderboard);
                });

                const timer = setInterval(() => {
                    const diff = DEADLINE - new Date();
                    setTimeLeft({
                        d: Math.max(0, Math.floor(diff / 86400000)),
                        h: Math.max(0, Math.floor((diff / 3600000) % 24)),
                        m: Math.max(0, Math.floor((diff / 60000) % 60)),
                        s: Math.max(0, Math.floor((diff / 1000) % 60))
                    });
                }, 1000);

                return () => { clearInterval(timer); resRef.off(); betsRef.off(); };
            }, [officialResults]);

            const showNotify = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false, msg: '' }), 4000);
            };

            const handlePick = (fId, fighter) => {
                if (userBet) return;
                setPicks(prev => ({ ...prev, [fId]: fighter }));
                if (!stakes[fId]) setStakes(prev => ({ ...prev, [fId]: 50 }));
            };

            const handleStakeChange = (fId, val) => {
                const other = Object.entries(stakes).filter(([id]) => id != fId).reduce((s, [_, v]) => s + parseInt(v), 0);
                const final = Math.min(Math.max(0, parseInt(val)), 1000 - other);
                setStakes(prev => ({ ...prev, [fId]: final }));
            };

            const submitBets = async (e) => {
                e.preventDefault();
                if (Object.keys(picks).length < FIGHTS.length) return alert("Obstaw wszystkie walki!");
                setStatus('loading');
                try {
                    await db.ref('wszystkie_kupony').push({ nick, typy: picks, stakes, data: new Date().toISOString() });
                    const betData = { nick, picks, stakes };
                    localStorage.setItem('fame_bet_30', JSON.stringify(betData));
                    setUserBet(betData);
                    setStatus('success');
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    showNotify("Kupon wysłany pomyślnie!");
                } catch (e) { alert("Błąd bazy!"); setStatus('idle'); }
            };

            const currentWallet = 1000 - Object.values(stakes).reduce((a, b) => a + (parseInt(b) || 0), 0);

            if (view === 'admin') {
                return (
                    <div className="min-h-screen p-8 max-w-xl mx-auto py-20">
                        {!isLogged ? (
                            <div className="card-bg p-8 rounded-3xl border border-yellow-500/20">
                                <h2 className="fame-font gold-text text-xl mb-6 text-center italic">ADMIN</h2>
                                <input id="l" className="w-full bg-zinc-900 p-4 rounded-xl mb-4 text-white outline-none" placeholder="Login" />
                                <input id="p" type="password" className="w-full bg-zinc-900 p-4 rounded-xl mb-6 text-white outline-none" placeholder="Hasło" />
                                <button onClick={() => {if(document.getElementById('l').value==='qali09' && document.getElementById('p').value==='QaLi090909.') setIsLogged(true);}} className="w-full btn-gold py-4 rounded-xl">WEJDŹ</button>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                {FIGHTS.map(f => (
                                    <div key={f.id} className="p-4 card-bg rounded-2xl">
                                        <p className="text-[10px] mb-2">{f.cat}</p>
                                        <div className="grid grid-cols-2 gap-2">
                                            {[f.p1, f.p2].map(p => (
                                                <button key={p} onClick={() => db.ref('official_results/' + f.id).set(p)} className={`py-2 rounded-lg text-[10px] font-black ${officialResults[f.id] === p ? 'bg-yellow-500 text-black' : 'bg-zinc-900 text-zinc-500'}`}>{p}</button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                                <button onClick={() => setView('home')} className="w-full btn-gold py-4 rounded-xl">WRÓĆ</button>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    {showFighterCard && (
                        <div className="fixed inset-0 z-[600] flex items-center justify-center p-4 blur-bg animate-in fade-in duration-300">
                            <div className="relative max-w-4xl w-full flex flex-col items-center">
                                <button onClick={() => setShowFighterCard(false)} className="mb-4 text-white fame-font text-sm font-black bg-black/50 px-6 py-2 rounded-full border border-white/10 uppercase">Zamknij [X]</button>
                                <img src="karta.png" className="max-w-full max-h-[80vh] object-contain rounded-2xl border-2 border-yellow-500 shadow-2xl" alt="CARD" />
                            </div>
                        </div>
                    )}

                    <div className={`fixed top-5 right-5 z-[300] p-4 rounded-xl card-bg border-l-4 border-l-yellow-500 shadow-2xl flex items-center gap-4 ${toast.show ? 'toast-show' : 'toast-hide'}`}>
                        <div><p className="text-[10px] text-zinc-500 font-bold uppercase italic">SYSTEM</p><p className="text-xs font-bold text-white">{toast.msg}</p></div>
                    </div>

                    {showTerms && (
                        <div className="fixed inset-0 z-[500] flex items-center justify-center p-6 blur-bg">
                            <div className="card-bg w-full max-w-md p-10 rounded-[40px] border border-yellow-500/20 text-center">
                                <h2 className="fame-font gold-text text-4xl mb-4 italic uppercase">FAME 30</h2>
                                <p className="text-zinc-400 text-sm mb-8">Otrzymujesz 1000 F30. Rozdziel je na walki i walcz o Top 1 rankingów!</p>
                                <button onClick={() => setShowTerms(false)} className="w-full btn-gold py-6 rounded-2xl animate-gold">START</button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-2xl mx-auto py-12 px-6">
                        <header className="text-center mb-16 relative">
                            <h1 onClick={() => {const c=secretClicks+1; setSecretClicks(c); if(c===5) setView('admin');}} 
                                className="fame-font text-7xl font-black italic gold-text mb-6 tracking-tighter cursor-default">FAME 30</h1>
                            
                            <div className="flex justify-center gap-4 mb-8">
                                {[{v:timeLeft.d,l:'D'},{v:timeLeft.h,l:'H'},{v:timeLeft.m,l:'M'},{v:timeLeft.s,l:'S'}].map(t=>(
                                    <div key={t.l} className="timer-box w-14 py-2 rounded-xl border border-zinc-800">
                                        <div className="text-xl font-black text-white">{t.v}</div>
                                        <div className="text-[8px] text-zinc-500 font-bold">{t.l}</div>
                                    </div>
                                ))}
                            </div>

                            <div className="inline-flex items-center gap-4 bg-zinc-900/50 p-4 rounded-3xl border border-yellow-500/20">
                                <div className="fame-coin">F30</div>
                                <div className="text-left">
                                    <p className="text-[9px] text-zinc-500 font-black uppercase">Twój Portfel</p>
                                    <p className="fame-font text-2xl gold-text">{userBet ? 'ZAKOŃCZONO' : `${currentWallet} F30`}</p>
                                </div>
                            </div>
                            <button onClick={()=>setShowFighterCard(true)} className="block mx-auto mt-6 text-[10px] fame-font gold-text underline italic tracking-widest uppercase">ZOBACZ KARTĘ WALK</button>
                        </header>

                        {userBet ? (
                            <div className="space-y-8 animate-in slide-in-from-bottom">
                                <div id="ticket" className="ticket-gradient p-10 rounded-[50px] border-2 border-yellow-500 shadow-2xl relative overflow-hidden">
                                    <h2 className="fame-font gold-text text-xl mb-8 text-center uppercase italic">KUPON AKTYWNY</h2>
                                    <p className="text-2xl font-black text-center mb-6 uppercase italic">{userBet.nick}</p>
                                    <div className="space-y-2">
                                        {FIGHTS.map(f => (
                                            <div key={f.id} className="flex justify-between border-b border-zinc-800 pb-2 text-[10px] italic">
                                                <span className="text-zinc-500 uppercase">{f.cat}</span>
                                                <span className="gold-text font-black uppercase">{userBet.picks[f.id]} ({userBet.stakes[f.id]} F30)</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={() => html2canvas(document.getElementById('ticket'), {backgroundColor:'#050505'}).then(c => { const a = document.createElement('a'); a.download=`F30_${userBet.nick}.png`; a.href=c.toDataURL(); a.click(); })} className="w-full btn-gold py-6 rounded-3xl uppercase font-black">Pobierz Dowód (PNG)</button>
                            </div>
                        ) : (
                            <form onSubmit={submitBets} className="space-y-6">
                                <input required className="w-full bg-zinc-900 border border-zinc-800 p-5 rounded-2xl text-center text-xl font-bold uppercase text-white" placeholder="TWÓJ NICK" value={nick} onChange={e=>setNick(e.target.value.toUpperCase())} />
                                <div className="space-y-4">
                                    {FIGHTS.map(f => (
                                        <div key={f.id} className="card-bg p-6 rounded-3xl border border-zinc-800 group">
                                            <p className="text-center text-[9px] text-zinc-500 font-bold mb-4 uppercase tracking-widest">{f.cat}</p>
                                            <div className="grid grid-cols-2 gap-4 mb-4">
                                                {[f.p1, f.p2].map(p => (
                                                    <button key={p} type="button" onClick={() => handlePick(f.id, p)} className={`py-5 rounded-xl font-black text-[10px] transition-all border-2 ${picks[f.id]===p ? 'btn-gold border-white' : 'bg-black border-zinc-900 text-zinc-600'}`}>{p.toUpperCase()}</button>
                                                ))}
                                            </div>
                                            {picks[f.id] && (
                                                <div className="mt-2 animate-in fade-in">
                                                    <div className="flex justify-between text-[10px] mb-2 font-bold uppercase italic"><span className="text-zinc-500">Stawka:</span><span className="gold-text">{stakes[f.id]} F30</span></div>
                                                    <input type="range" min="0" max="1000" step="10" value={stakes[f.id] || 0} onChange={(e) => handleStakeChange(f.id, e.target.value)} className="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-yellow-500" />
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <button type="submit" disabled={status==='loading'} className="w-full btn-gold py-8 rounded-[40px] text-2xl font-black italic animate-gold uppercase mt-10">
                                    {status === 'loading' ? 'WYSYŁANIE...' : 'ZATWIERDŹ KUPON'}
                                </button>
                            </form>
                        )}

                        <div className="mt-20 card-bg p-8 rounded-[40px] border border-zinc-800 shadow-2xl">
                            <h3 className="fame-font gold-text text-xl mb-8 text-center uppercase italic underline decoration-yellow-500/20">Ranking Rekinów</h3>
                            <div className="space-y-3">
                                {ranking.map((p, i) => (
                                    <div key={i} className="flex justify-between items-center p-5 bg-black/40 rounded-2xl border border-zinc-900 hover:border-yellow-500/30 transition-all">
                                        <span className="fame-font gold-text text-sm">#{i+1} {p.nick}</span>
                                        <span className="font-black text-white text-sm">{p.points} F30</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <footer className="mt-20 text-center opacity-20">
                            <p className="text-[8px] fame-font tracking-[1em] uppercase italic">RESTREAM © 2026</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
